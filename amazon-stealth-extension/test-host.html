<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Amazon plugin test host</title>
  <link rel="stylesheet" href="./content.css">
  <style>
    body{margin:0;font-family:Arial,sans-serif;background:#fff;color:#111}
    .top{height:54px;background:#131921;color:#fff;display:flex;align-items:center;padding:0 18px;font-size:28px;font-weight:800}
    .nav{height:39px;background:#232f3e;color:#fff;display:flex;align-items:center;padding:0 18px}
    .page{max-width:1500px;margin:0 auto;padding:28px;display:grid;grid-template-columns:620px 1fr 280px;gap:24px}
    .image{height:590px;background:#f2f8fb;border:1px solid #eee;display:grid;place-items:center;font-size:34px;color:#2570a5}
    #centerCol h1{font-weight:400;line-height:1.25;margin:0 0 18px}
    #rightCol{border:1px solid #d5d9d9;border-radius:8px;padding:16px;min-height:620px}
    .btn{height:36px;border:0;border-radius:18px;background:#ffd814;width:100%;margin-top:10px}
  </style>
</head>
<body>
  <div class="top">amazon</div>
  <div class="nav">All&nbsp;&nbsp; Prime Day&nbsp;&nbsp; Best Sellers</div>
  <main class="page">
    <div class="image">Product image</div>
    <section id="centerCol"><h1>Portable Atomizer for Adults & Kids Humidifiers Face & Nose with Adjustable Mist Output</h1><p>Brand: Janday</p><h2>$55.99</h2><p>Top highlights</p><p>Item details</p><p>Features & Specs</p></section>
    <aside id="rightCol"><b>prime</b><p>FREE delivery Monday</p><button class="btn">Add to cart</button><button class="btn">Buy Now</button></aside>
  </main>
  <script src="./content.js"></script>
</body>
</html>
