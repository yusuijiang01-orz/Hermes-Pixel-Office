<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
  <title>Hermes Companyverse</title>
  <style>
    *{box-sizing:border-box}html,body{margin:0;height:100%;overflow:hidden;background:#13191d;color:#f6f1df;font-family:"Microsoft YaHei",Arial,sans-serif}
    .wrap{height:100%;display:grid;grid-template-rows:54px 1fr 166px;background:#18232a}
    header{display:flex;align-items:center;gap:14px;padding:0 14px;border-bottom:3px solid #0b1114;background:#1d2b32}
    .brand{font-weight:900;letter-spacing:.02em}.brand b{color:#e5b94d}.status{font-size:12px;color:#9fc6ae}.hint{margin-left:auto;color:#d7c67b;font-size:12px;white-space:nowrap}
    canvas{width:100%;height:100%;display:block;background:#d8c8a4;image-rendering:pixelated;touch-action:none}
    .bar{display:grid;grid-template-rows:58px 1fr;gap:10px;padding:12px;background:#10181c;border-top:3px solid #344248}
    button{border:3px solid #314046;background:#f0c85a;color:#172126;font-weight:900;box-shadow:4px 4px 0 #0b1114;touch-action:none}
    .msg{display:flex;align-items:center;padding:0 12px;border:3px solid #415158;background:#f7f4ea;color:#27343b;font-size:13px;line-height:1.35;overflow:hidden}
    .controls{display:grid;grid-template-columns:150px 1fr 150px;align-items:center;gap:12px;min-width:0}
    .stick{position:relative;width:92px;height:92px;justify-self:start;border:4px solid #405057;border-radius:50%;background:radial-gradient(circle at 35% 35%,#3c484d,#12191d 72%);box-shadow:inset 0 0 0 8px #222d32,4px 4px 0 #0b1114;touch-action:none}
    .stick::before{content:'';position:absolute;left:50%;top:50%;width:42px;height:42px;transform:translate(-50%,-50%);border-radius:50%;background:#0d1215;box-shadow:inset 0 0 0 5px #283238}
    .stick-knob{position:absolute;left:50%;top:50%;width:38px;height:38px;transform:translate(-50%,-50%);border:3px solid #54636a;border-radius:50%;background:radial-gradient(circle at 35% 30%,#606b70,#22292d 62%,#101417);box-shadow:0 5px 0 #080c0e;pointer-events:none}
    .home-key{justify-self:center;width:min(100%,150px);height:36px;border-color:#42545a;background:#26343a;color:#f0c85a;font-size:12px;letter-spacing:.08em}
    .face{justify-self:end;display:grid;grid-template-columns:42px 42px 42px;grid-template-rows:32px 32px 32px;gap:4px;align-items:center}
    .face button{width:38px;height:38px;border-radius:50%;border-color:#314046;background:#0e1518;color:#f0c85a;box-shadow:inset 0 0 0 3px #263238,3px 3px 0 #0b1114;font-size:18px}
    #tri{grid-column:2;grid-row:1;color:#e6cf57}#square{grid-column:1;grid-row:2;color:#79b7e8}#act{grid-column:3;grid-row:2;color:#69d183}#cross{grid-column:2;grid-row:3;color:#e45f42}
    .small{font-size:11px;color:#8ea09c}
    .safe-nav{position:fixed;z-index:60;left:12px;top:64px;display:flex;gap:8px;pointer-events:auto}
    .safe-nav button{height:36px;padding:0 12px;border-color:#304247;background:#f0c85a;color:#172126;font-size:12px;box-shadow:4px 4px 0 #0b1114}
    .safe-nav .home{background:#26343a;color:#f0c85a}
    @media(max-width:700px){.wrap{grid-template-rows:48px 1fr calc(244px + env(safe-area-inset-bottom))}header{gap:8px;padding:0 10px}.brand{font-size:13px}.status{display:none}.hint{display:none}.safe-nav{top:56px;left:10px;right:10px}.safe-nav button{height:38px;padding:0 10px;font-size:12px;box-shadow:3px 3px 0 #0b1114}.bar{grid-template-rows:62px 1fr;gap:8px;padding:8px 12px calc(20px + env(safe-area-inset-bottom));background:linear-gradient(180deg,rgba(16,24,28,.88),rgba(16,24,28,.96));}.msg{font-size:13px;padding:0 12px}.controls{grid-template-columns:128px minmax(82px,1fr) 138px;gap:4px;align-items:center}.stick{width:120px;height:120px;border-color:rgba(133,158,168,.48);background:radial-gradient(circle at 36% 34%,rgba(118,136,144,.44),rgba(18,25,29,.38) 72%);box-shadow:inset 0 0 0 11px rgba(34,45,50,.48),0 10px 22px rgba(0,0,0,.32)}.stick::before{width:60px;height:60px;background:rgba(13,18,21,.42);box-shadow:inset 0 0 0 7px rgba(80,98,106,.42)}.stick-knob{width:54px;height:54px;border-color:rgba(150,170,178,.78);background:radial-gradient(circle at 35% 30%,rgba(140,156,164,.90),rgba(55,67,73,.82) 62%,rgba(12,17,20,.82));box-shadow:0 7px 16px rgba(0,0,0,.34)}.face{grid-template-columns:46px 46px 46px;grid-template-rows:44px 44px 44px;gap:3px}.face button{width:44px;height:44px;font-size:20px;background:rgba(14,21,24,.78);box-shadow:inset 0 0 0 4px rgba(38,50,56,.88),0 8px 14px rgba(0,0,0,.32)}.home-key{width:90px;height:42px;font-size:13px;padding:0;background:rgba(38,52,58,.88)}}
  </style>
</head>
<body>
<div class="wrap">
  <header><div class="brand"><b>HERMES</b> COMPANYVERSE</div><div class="status" id="status">宇宙广场</div><div class="status" id="fps">FPS --</div><div class="hint">小游戏宇宙：按公司键返回真正的像素公司</div></header>
  <canvas id="game"></canvas>
  <div class="bar">
    <div class="msg" id="msg">宇宙广场：靠近发光入口后按 〇。左侧回像素公司大厅，中间进入小游戏项目，右侧查看生活彩蛋。</div>
    <div class="controls">
      <div class="stick" id="stick" aria-label="移动摇杆">
        <div class="stick-knob" id="stickKnob"></div>
      </div>
      <button id="home" class="home-key">公司</button>
      <div class="face">
        <button id="tri">△</button><button id="square">□</button><button id="cross">×</button><button id="act">〇</button>
      </div>
    </div>
  </div>
</div>
<div class="safe-nav" aria-label="安全返回导航">
  <button id="safeReturnBtn" type="button">← 返回</button>
  <button id="safeHomeBtn" class="home" type="button">⌂ 公司首页</button>
</div>
<script>
const canvas=document.querySelector('#game'),msgEl=document.querySelector('#msg'),statusEl=document.querySelector('#status'),fpsEl=document.querySelector('#fps');
let ctx=canvas.getContext('2d');
const keys={left:false,right:false,up:false,down:false,act:false};
const stick={x:0,y:0};
let mode='street',px=0,py=0,vx=0,vy=0,onGround=false,last=0,portal='',fpsFrames=0,fpsLast=0;
let coins=0,lives=3,streetTime=0;
let streetCache=null,streetCacheKey='',buildingStreetCache=false;
// Shared assets positions in office
const officeAssets={
  fishTank:{x:0,y:0,w:90,h:70}, // right wall
  coffeeMachine:{x:0,y:0,w:36,h:44}, // water bar corner
  iceMachine:{x:0,y:0,w:32,h:40}, // next to coffee
  milkFoamer:{x:0,y:0,w:28,h:36}, // on counter
  microwave:{x:0,y:0,w:46,h:28}, // water bar shelf
  corgi:{x:0,y:0,w:40,h:28}, // near writer desk
  desks:[[90,200],[260,200],[90,330],[260,330]]
};
const people=[['阿默',160,225,'#4aa6a0'],['小韩',310,225,'#e7b34d'],['小研',160,355,'#e45a9c'],['小文',310,355,'#a878d1']];

// Fish tank fish data
const fishes=[{dx:1,dy:0,x:0,y:0},{dx:-1,dy:0.5,x:0,y:35},{dx:0.5,dy:-1,x:45,y:18}];
let renderTime=0;
const worldObjects=new Map();

// Street mini-game state
let streetGates=[
  {name:'Mushroom Runner',x:0,y:0,w:110,h:76,color:'#c85d4b',key:'mushroom',entered:false},
  {name:'柯基追鱼',x:0,y:0,w:110,h:76,color:'#d99a4e',key:'corgi',entered:false},
  {name:'锦鲤保佑',x:0,y:0,w:110,h:76,color:'#6aa6a5',key:'koi',entered:false}
];

// Mario game state
const marioPlatforms=[[20,420,190,18],[260,360,120,18],[430,300,130,18],[620,245,110,18],[780,390,180,18]];
const marioBugs=[[360,340,0],[565,280,1],[845,370,0]];
// Coins: object array so collected coins stay collected
let marioCoins=[
  {x:150,y:280,collected:false},{x:245,y:280,collected:false},{x:340,y:280,collected:false},
  {x:435,y:280,collected:false},{x:530,y:280,collected:false},{x:625,y:280,collected:false},
  {x:720,y:280,collected:false},{x:815,y:280,collected:false}
];

// Corgi chase fish game state
let corgiState={playerX:0,playerY:0,fishes:[],score:0,time:0,active:false};

// Koi blessing game state
let koiState={playerX:0,playerY:0,koi:[],score:0,active:false};

function resetStreetSpawn(){const w=canvas.clientWidth,h=canvas.clientHeight;if(mode==='street'){px=w<700?w*.50:w*.40;py=w<700?Math.max(430,h*.68):Math.max(330,h*.56)}}
function resize(){const d=1,r=canvas.getBoundingClientRect();canvas.width=Math.max(1,Math.round(r.width*d));canvas.height=Math.max(1,Math.round(r.height*d));ctx.setTransform(d,0,0,d,0,0);streetCache=null;streetCacheKey='';if(!px&&!py)resetStreetSpawn()}
addEventListener('resize',resize);resize();

function rect(x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h))}
function text(s,x,y,size=12,c='#253238',align='left'){ctx.fillStyle=c;ctx.font=`900 ${size}px Microsoft YaHei`;ctx.textAlign=align;ctx.fillText(s,x,y);ctx.textAlign='left'}
function label(s,x,y,w=86){rect(x-w/2,y-13,w,17,'#263432');text(s,x,y,10,'#f6f1df','center')}
function shadow(x,y,w=28,h=8){ctx.fillStyle='rgba(28,38,38,.22)';ctx.fillRect(Math.round(x-w/2),Math.round(y-h/2),Math.round(w),Math.round(h))}
function registerObject(scene,id,name,x,y,w,h,meta={}){
  worldObjects.set(`${scene}:${id}`,{id,name,scene,x:Math.round(x),y:Math.round(y),w:Math.round(w),h:Math.round(h),cx:Math.round(x+w/2),cy:Math.round(y+h/2),updatedAt:Math.round(renderTime),...meta});
}
function clearSceneObjects(scene){
  for(const key of [...worldObjects.keys()])if(key.startsWith(scene+':'))worldObjects.delete(key);
}
function getWorldSnapshot(scene=mode){
  return [...worldObjects.values()].filter(o=>!scene||o.scene===scene).sort((a,b)=>a.y-b.y||a.x-b.x);
}
window.CompanyverseWorld={objects:worldObjects,snapshot:getWorldSnapshot,queueCorgiEvent};
function spriteStyle(name,c){
  const base={skin:'#f0c49b',shirt:c,hair:'#283338',accent:'#f2d061',mouth:'#844b45',eye:'#172226'};
  if(name==='阿默')return {...base,hair:'#263a3c',shirt:'#4aa6a0',accent:'#81d8ca',mouth:'#6b4b3f'};
  if(name==='小韩')return {...base,hair:'#593034',shirt:'#e7b34d',accent:'#fff0a0',mouth:'#7a403d'};
  if(name==='小研')return {...base,hair:'#3b333c',shirt:'#e45a9c',accent:'#ffd3e7',mouth:'#803f5e'};
  if(name==='小文')return {...base,hair:'#333944',shirt:'#a878d1',accent:'#f8dd74',mouth:'#714c8a'};
  return {...base,hair:'#4b302b',shirt:'#e5b94d',accent:'#fff0a0'};
}
function pixelFace(x,y,style,variant='warm',scale=1){
  const px=(v)=>Math.round(v*scale);
  const look=variant==='curious'?px(1):variant==='soft'?-px(1):0;
  const blink=variant==='blink'||Math.sin((renderTime+x*17)/850)>0.965;
  if(blink){
    rect(x-px(8),y+px(1),px(6),px(2),style.eye);rect(x+px(2),y+px(1),px(6),px(2),style.eye);
  }else{
    rect(x-px(8),y-px(2),px(6),px(5),'#fff8df');rect(x+px(2),y-px(2),px(6),px(5),'#fff8df');
    rect(x-px(6)+look,y,px(2),px(3),style.eye);rect(x+px(4)+look,y,px(2),px(3),style.eye);
  }
  rect(x-px(10),y+px(6),px(3),px(2),'#e7a190');rect(x+px(8),y+px(6),px(3),px(2),'#e7a190');
  if(variant==='talk'){rect(x-px(4),y+px(8),px(8),px(5),style.mouth);rect(x-px(2),y+px(9),px(4),px(2),'#f2b6a9')}
  else if(variant==='joy'){rect(x-px(5),y+px(8),px(10),px(2),style.mouth);rect(x-px(3),y+px(10),px(6),px(2),'#f2b6a9')}
  else if(variant==='focus'){rect(x-px(5),y+px(8),px(10),px(2),'#5f3d39');rect(x-px(8),y-px(5),px(7),px(2),'#3b3430');rect(x+px(2),y-px(5),px(7),px(2),'#3b3430')}
  else if(variant==='steady'){rect(x-px(4),y+px(8),px(8),px(2),style.mouth)}
  else if(variant==='smirk'){rect(x-px(3),y+px(8),px(7),px(2),style.mouth);rect(x+px(4),y+px(7),px(2),px(1),style.mouth)}
  else {rect(x-px(4),y+px(8),px(8),px(2),style.mouth);rect(x-px(2),y+px(10),px(4),px(1),style.mouth)}
}
function liveFaceVariant(name){
  const moods=name==='小韩'?['focus','steady','blink','talk']:name==='小研'?['curious','talk','joy','blink']:name==='小文'?['soft','joy','talk','blink']:name==='阿默'?['smirk','focus','talk','blink']:['warm','joy','blink'];
  const seed=(name||'老板').split('').reduce((n,ch)=>n+ch.charCodeAt(0),0);
  return moods[Math.floor((renderTime+seed*37)/1500)%moods.length];
}
function pixelPerson(name,x,y,c,scale=1,withLabel=true){
  const s=spriteStyle(name,c), px=(v)=>Math.round(v*scale), top=y-px(42);
  shadow(x,y+px(2),px(34),px(8));
  rect(x-px(13),top+px(12),px(26),px(21),'#1c282b');
  rect(x-px(11),top+px(14),px(22),px(18),s.skin);
  rect(x-px(13),top+px(9),px(26),px(10),s.hair);
  rect(x-px(11),top+px(7),px(17),px(5),s.hair);
  if(name==='小研'){rect(x+px(8),top+px(12),px(5),px(8),s.hair);rect(x-px(15),top+px(16),px(4),px(7),s.hair)}
  if(name==='小文'){rect(x-px(15),top+px(15),px(5),px(11),s.hair);rect(x+px(10),top+px(15),px(5),px(11),s.hair);rect(x+px(9),top+px(5),px(4),px(5),s.accent)}
  if(name==='阿默'){rect(x+px(7),top+px(8),px(5),px(4),s.accent)}
  if(name==='小韩'){rect(x-px(5),top+px(6),px(11),px(4),s.accent)}
  pixelFace(x,top+px(22),s,liveFaceVariant(name),scale);
  rect(x-px(13),top+px(33),px(26),px(19),'#1c282b');
  rect(x-px(10),top+px(35),px(20),px(15),s.shirt);
  rect(x-px(14),top+px(37),px(4),px(12),s.skin);rect(x+px(10),top+px(37),px(4),px(12),s.skin);
  rect(x-px(8),top+px(50),px(6),px(11),'#233034');rect(x+px(2),top+px(50),px(6),px(11),'#233034');
  rect(x-px(9),top+px(60),px(8),px(3),'#1c282b');rect(x+px(1),top+px(60),px(8),px(3),'#1c282b');
  if(withLabel){rect(x-px(20),y+px(17),px(40),px(14),'#263432');text(name,x,y+px(28),px(9),'#fff','center')}
}
function faceVariant(name){return name==='阿默'?'smirk':name==='小韩'?'steady':name==='小研'?'curious':name==='小文'?'soft':'warm'}
function hero(x,y){pixelPerson('老板',x,y,'#e5b94d',1,false)}
function employee(name,x,y,c){pixelPerson(name,x,y,c,1,true)}
function employeeTiny(x,y,c){pixelPerson('',x,y,c,.74,false)}

// Draw fish tank with animated fish
function drawFishTank(t,w,h,ax,ay){
  // Tank glass
  rect(ax,ay,officeAssets.fishTank.w,officeAssets.fishTank.h,'#82c6c0');
  rect(ax-2,ay-2,officeAssets.fishTank.w+4,officeAssets.fishTank.h+2,'#314046');
  // Water
  rect(ax+3,ay+3,officeAssets.fishTank.w-6,officeAssets.fishTank.h-6,'#6aa6a5');
  // Sand bottom
  rect(ax+3,ay+officeAssets.fishTank.h-14,officeAssets.fishTank.w-6,11,'#d8c8a4');
  // Plants
  for(let i=0;i<3;i++){rect(ax+12+i*28,ay+officeAssets.fishTank.h-20,6,10,'#5e8d68')}
  // Animated fish
  fishes.forEach((f,i)=>{
    f.x=(f.x+f.dx+officeAssets.fishTank.w-10)%(officeAssets.fishTank.w-10);
    f.y=ay+8+Math.sin(t/400+i*2)*8;
    rect(f.x,Math.round(f.y),8,5,i===0?'#e45f42':i===1?'#f0c85a':'#4aa6a0');
    rect(f.x+(f.dx>0?6:-2),Math.round(f.y)+1,2,3,i===0?'#e45f42':i===1?'#f0c85a':'#4aa6a0');
  });
  // Bubbles
  for(let i=0;i<4;i++){
    let bx=ax+10+i*20+Math.sin(t/600+i)*5;
    let by=ay+officeAssets.fishTank.h-10-(t/20+i*15)%30;
    ctx.strokeStyle='#ffffff44';ctx.lineWidth=1;ctx.beginPath();ctx.arc(bx,by,2,0,Math.PI*2);ctx.stroke();
  }
  // Label
  text('鱼缸',ax+officeAssets.fishTank.w/2,ay+officeAssets.fishTank.h+12,9,'#5b4d40','center');
}

// Draw coffee machine with steam
function drawCoffeeMachine(t,w,h,ax,ay){
  rect(ax,ay,officeAssets.coffeeMachine.w,officeAssets.coffeeMachine.h,'#365550');
  rect(ax+2,ay+2,officeAssets.coffeeMachine.w-4,officeAssets.coffeeMachine.h-4,'#314046');
  // Screen
  rect(ax+6,ay+6,officeAssets.coffeeMachine.w-12,10,'#8fcfc2');
  // Button
  rect(ax+10,ay+20,6,6,'#e5b94d');
  rect(ax+20,ay+20,6,6,'#e45f42');
  // Cup
  rect(ax+10,ay+officeAssets.coffeeMachine.h-12,12,10,'#f7f4ea');
  // Steam
  for(let i=0;i<3;i++){
    let sx=ax+14+i*6;
    let sy=ay-4-(t/150+i*8)%12;
    ctx.strokeStyle='#ffffff33';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(sx,sy+6);ctx.quadraticCurveTo(sx+2,sy+3,sx,sy);ctx.stroke();
  }
  text('咖啡机',ax+officeAssets.coffeeMachine.w/2,ay+officeAssets.coffeeMachine.h+12,9,'#5b4d40','center');
}

// Draw ice machine
function drawIceMachine(t,w,h,ax,ay){
  rect(ax,ay,officeAssets.iceMachine.w,officeAssets.iceMachine.h,'#c8d8d8');
  rect(ax+2,ay+2,officeAssets.iceMachine.w-4,officeAssets.iceMachine.h-4,'#a8bcbf');
  // Ice dispenser
  rect(ax+8,ay+officeAssets.iceMachine.h-18,16,12,'#e8f4f4');
  // Ice cubes
  for(let i=0;i<3;i++){rect(ax+10+i*5,ay+officeAssets.iceMachine.h-16+i*3,4,4,'#d0e8e8')}
  text('制冰机',ax+officeAssets.iceMachine.w/2,ay+officeAssets.iceMachine.h+12,9,'#5b4d40','center');
}

// Draw milk frother
function drawMilkFoamer(t,w,h,ax,ay){
  rect(ax,ay,officeAssets.milkFoamer.w,officeAssets.milkFoamer.h,'#f0e8d8');
  rect(ax+2,ay+2,officeAssets.milkFoamer.w-4,officeAssets.milkFoamer.h-4,'#e8dcc8');
  // Froth nozzle
  rect(ax+8,ay-4,12,6,'#c8c0b0');
  // Froth bubbles
  for(let i=0;i<3;i++){
    let fy=ay-8-i*4-Math.sin(t/300+i)*2;
    ctx.fillStyle='#ffffff55';ctx.beginPath();ctx.arc(ax+14+i*4,fy,2,0,Math.PI*2);ctx.fill();
  }
  text('打奶泡',ax+officeAssets.milkFoamer.w/2,ay+officeAssets.milkFoamer.h+12,9,'#5b4d40','center');
}

function drawMicrowave(t,w,h,ax,ay){
  const item=officeAssets.microwave;
  registerObject('office','microwave','微波炉',ax,ay,item.w,item.h,{category:'water_bar_equipment',interactable:true,nearbyHint:'水吧角落，咖啡机旁边'});
  rect(ax,ay,item.w,item.h,'#d6d6cf');
  rect(ax+2,ay+2,item.w-4,item.h-4,'#9aa7a7');
  rect(ax+6,ay+6,24,14,'#1f3034');
  rect(ax+9,ay+9,18,8,'#cfe8dc');
  rect(ax+34,ay+6,6,4,'#e5b94d');
  rect(ax+34,ay+13,6,4,'#e45f42');
  rect(ax+7,ay+22,32,3,'#687579');
  if(Math.sin(t/420)>0.7)rect(ax+12,ay+11,9,3,'#f3d486');
  text('微波炉',ax+item.w/2,ay+item.h+11,9,'#5b4d40','center');
}

const corgiFrames={};
const CORGI_ANIMS={
  idle:['idle_0','idle_1','idle_2','idle_3','idle_4','idle_5','idle_6','idle_7'],
  walk:['walk_0','walk_1','walk_2','walk_3','walk_4','walk_5','walk_6','walk_7'],
  run:['run_0','run_1','run_2','run_3','run_4','run_5','run_6','run_7'],
  bark:['bark_0','bark_1','bark_2','bark_3','bark_4','bark_5','bark_6','bark_7'],
  sleep:['sleep_0','sleep_1','sleep_2','sleep_3','sleep_4','sleep_5','sleep_6','sleep_7'],
  sniff:['sniff_0','sniff_1','sniff_2','sniff_3','sniff_4','sniff_5','sniff_6','sniff_7'],
  happy:['happy_0','happy_1','happy_2','happy_3','happy_4','happy_5','happy_6','happy_7'],
  jump_start:['jump_start_0','jump_start_1'],
  jump_air:['jump_air_0','jump_air_1','jump_air_2'],
  jump_land:['jump_land_0','jump_land_1','jump_land_2']
};
Object.values(CORGI_ANIMS).flat().forEach(id=>{
  const img=new Image();
  img.src=`assets/corgi/${id}.png`;
  corgiFrames[id]=img;
});
const corgiFSM={
  behavior:'Rest',state:'idle',previousBaseState:'idle',stateTime:0,idleTime:0,lastUpdate:0,
  speed:0,targetSpeed:0,hasMoveIntent:false,isGrounded:true,dir:1,stepPhase:0,
  sleepiness:.25,curiosity:.65,happiness:.55,alertness:.2,randomTimer:.8,
  cooldowns:{bark:1.2,sniff:2.5,happy:2,jump:1.2},events:[]
};
const corgiWorld={x:0,y:0,targetX:0,nextDecision:0,ready:false};
function corgiAnimDuration(state){return state==='bark'?0.9:state==='sniff'?1.35:state==='happy'?1.2:state==='jump_start'?0.25:state==='jump_air'?0.45:state==='jump_land'?0.28:0}
function corgiIsTemp(state){return ['bark','sniff','happy','jump_start','jump_air','jump_land'].includes(state)}
function corgiResolveBase(){
  if(!corgiFSM.isGrounded)return 'jump_air';
  if(corgiFSM.hasMoveIntent&&corgiFSM.targetSpeed>1.8)return 'run';
  if(corgiFSM.hasMoveIntent&&corgiFSM.targetSpeed>.15)return 'walk';
  return 'idle';
}
function corgiSetState(state){
  if(corgiFSM.state===state)return;
  if(corgiIsTemp(state))corgiFSM.previousBaseState=corgiResolveBase();
  corgiFSM.state=state;corgiFSM.stateTime=0;
}
function queueCorgiEvent(type,strength=1){corgiFSM.events.push({type,strength,t:renderTime})}
function corgiEnterTemp(state,cooldown){
  corgiSetState(state);
  if(corgiFSM.cooldowns[state]!==undefined)corgiFSM.cooldowns[state]=cooldown;
}
function updateCorgiFSM(t,ctx={}){
  const dt=Math.min(.08,Math.max(0,((corgiFSM.lastUpdate?t-corgiFSM.lastUpdate:16)/1000)));corgiFSM.lastUpdate=t;
  corgiFSM.speed=ctx.speed??0;corgiFSM.targetSpeed=ctx.targetSpeed??corgiFSM.speed;corgiFSM.hasMoveIntent=!!ctx.hasMoveIntent;corgiFSM.isGrounded=ctx.isGrounded!==false;
  if(ctx.dir)corgiFSM.dir=ctx.dir;
  corgiFSM.stateTime+=dt;
  corgiFSM.idleTime=(corgiFSM.speed<.08&&!corgiFSM.hasMoveIntent)?corgiFSM.idleTime+dt:0;
  corgiFSM.sleepiness=Math.max(0,Math.min(1,corgiFSM.sleepiness+(corgiFSM.idleTime>6?dt*.012:-dt*.01)));
  corgiFSM.curiosity=Math.max(0,Math.min(1,corgiFSM.curiosity+(ctx.nearInterestingObject?dt*.04:-dt*.01)));
  corgiFSM.happiness=Math.max(0,Math.min(1,corgiFSM.happiness+(ctx.ownerNearby?dt*.025:-dt*.006)));
  Object.keys(corgiFSM.cooldowns).forEach(k=>corgiFSM.cooldowns[k]=Math.max(0,corgiFSM.cooldowns[k]-dt));
  if(corgiFSM.state==='sleep'){
    if(ctx.forceWake||corgiFSM.hasMoveIntent||corgiFSM.events.some(e=>e.strength>.8)){corgiSetState('idle');corgiFSM.sleepiness=.25}
    return;
  }
  if(corgiFSM.state==='jump_start'&&corgiFSM.stateTime>corgiAnimDuration('jump_start')){corgiSetState('jump_air');return}
  if(corgiFSM.state==='jump_air'&&corgiFSM.stateTime>corgiAnimDuration('jump_air')){corgiSetState('jump_land');return}
  if(corgiFSM.state==='jump_land'&&corgiFSM.stateTime>corgiAnimDuration('jump_land')){corgiSetState(corgiResolveBase());return}
  if(corgiIsTemp(corgiFSM.state)&&corgiFSM.stateTime>corgiAnimDuration(corgiFSM.state)){corgiSetState(corgiResolveBase());return}
  if(corgiIsTemp(corgiFSM.state))return;
  const event=corgiFSM.events.sort((a,b)=>({jump:4,bark:3,happy:2,sniff:1}[b.type]||0)-(({jump:4,bark:3,happy:2,sniff:1}[a.type]||0))).shift();
  corgiFSM.events.length=0;
  if(event){
    if(event.type==='jump'&&corgiFSM.cooldowns.jump<=0){corgiEnterTemp('jump_start',1.2);return}
    if(event.type==='bark'&&corgiFSM.cooldowns.bark<=0&&corgiFSM.speed<.35){corgiEnterTemp('bark',2.8);return}
    if(event.type==='happy'&&corgiFSM.cooldowns.happy<=0){corgiEnterTemp('happy',4);return}
    if(event.type==='sniff'&&corgiFSM.cooldowns.sniff<=0&&corgiFSM.speed<.2){corgiEnterTemp('sniff',8);return}
  }
  corgiFSM.randomTimer-=dt;
  if(corgiFSM.randomTimer<=0){
    corgiFSM.randomTimer=.7+Math.random()*.8;
    if(corgiFSM.state==='idle'&&corgiFSM.idleTime>.8){
      const canSniff=ctx.nearInterestingObject&&corgiFSM.curiosity>.45&&corgiFSM.cooldowns.sniff<=0;
      const canHappy=ctx.ownerNearby&&corgiFSM.happiness>.68&&corgiFSM.cooldowns.happy<=0;
      const canBark=(ctx.alertness||corgiFSM.alertness)>.5&&corgiFSM.cooldowns.bark<=0;
      const canSleep=(ctx.allowSleep||false)&&corgiFSM.idleTime>20&&corgiFSM.sleepiness>.7;
      const roll=Math.random();
      if(canSleep){corgiSetState('sleep');return}
      if(canSniff&&roll<.38){corgiEnterTemp('sniff',7+Math.random()*5);return}
      if(canHappy&&roll<.58){corgiEnterTemp('happy',4+Math.random()*3);return}
      if(canBark&&roll<.72){corgiEnterTemp('bark',2+Math.random()*3);return}
    }
  }
  if(!corgiFSM.isGrounded){corgiSetState('jump_air');return}
  if(corgiFSM.state==='run'&&corgiFSM.targetSpeed<1.5)corgiSetState('walk');
  else if(corgiFSM.targetSpeed>1.8&&corgiFSM.hasMoveIntent)corgiSetState('run');
  else if(corgiFSM.targetSpeed>.15&&corgiFSM.hasMoveIntent)corgiSetState('walk');
  else if(corgiFSM.speed<.08&&corgiFSM.stateTime>.25)corgiSetState('idle');
}
function updateCorgiWorld(t,w,roadY,narrow){
  const minX=w*.70,maxX=w*.86,homeX=w*.76,y=narrow?roadY+170:roadY+118;
  if(!corgiWorld.ready){corgiWorld.x=homeX;corgiWorld.targetX=homeX;corgiWorld.nextDecision=t+900;corgiWorld.ready=true}
  let dx=corgiWorld.targetX-corgiWorld.x, moving=Math.abs(dx)>1.5, speed=0;
  if(moving){
    const step=Math.sign(dx)*(narrow?0.42:0.58);
    corgiWorld.x+=Math.abs(step)>Math.abs(dx)?dx:step;
    corgiFSM.dir=dx>=0?1:-1;
    corgiFSM.stepPhase=(corgiFSM.stepPhase+Math.abs(step))%64;
    speed=Math.abs(step);
  }else if(t>corgiWorld.nextDecision&&!corgiIsTemp(corgiFSM.state)){
    const roll=Math.random();
    if(roll<.46)corgiWorld.targetX=minX+Math.random()*(maxX-minX);
    else if(roll<.63)queueCorgiEvent('sniff',.7);
    else if(roll<.78)queueCorgiEvent('happy',.8);
    else if(roll<.9)queueCorgiEvent('bark',.8);
    corgiWorld.nextDecision=t+1200+Math.random()*2600;
  }
  updateCorgiFSM(t,{speed,targetSpeed:speed,hasMoveIntent:moving,nearInterestingObject:!moving,ownerNearby:false,dir:corgiFSM.dir});
  return {x:corgiWorld.x,y};
}

// Draw corgi
function drawCorgi(t,w,h,ax,ay){
  const hour=new Date().getHours();
  updateCorgiFSM(t,{speed:0,targetSpeed:0,hasMoveIntent:false,nearInterestingObject:true,ownerNearby:true,allowSleep:hour>=22||hour<7});
  const mobile=w<700,scale=mobile?.20:.34;
  drawCorgiSprite(t,ax-(mobile?12:18),ay-(mobile?34:46),scale,true,corgiFSM.dir,corgiFSM.state);
}
function drawCorgiSprite(t,ax,ay,scale=1,label=false,dir=1,anim='walk'){
  const list=CORGI_ANIMS[anim]||CORGI_ANIMS.walk;
  const rate=anim==='run'?75:anim==='bark'?120:anim==='sniff'?150:anim==='happy'?115:anim==='sleep'?260:160;
  const locomotion=anim==='walk'||anim==='run';
  const id=locomotion?list[Math.floor(corgiFSM.stepPhase/8)%list.length]:list[Math.floor(t/rate)%list.length];
  const img=corgiFrames[id];
  if(img&&img.complete&&img.naturalWidth){
    const dw=img.naturalWidth*scale,dh=img.naturalHeight*scale,ox=Math.round(ax),oy=Math.round(ay);
    shadow(ox+dw*.5,oy+dh*.92,dw*.78,8);
    ctx.save();
    if(dir<0){ctx.translate(ox+dw,oy);ctx.scale(-1,1);ctx.drawImage(img,0,0,dw,dh)}
    else ctx.drawImage(img,ox,oy,dw,dh);
    ctx.restore();
    if(label)text('小文柯基',ox+dw/2,oy+dh+10,9,'#5b4d40','center');
    return;
  }
  const p=(v)=>Math.round(v*scale*3), ox=Math.round(ax), oy=Math.round(ay);
  shadow(ox+p(25),oy+p(34),p(48),p(8));rect(ox+p(5),oy+p(16),p(36),p(18),'#c9853f');rect(ox+p(10),oy+p(12),p(27),p(14),'#d99a4e');rect(ox+p(16),oy+p(23),p(13),p(10),'#fff0d6');rect(ox+p(35),oy+p(7),p(20),p(19),'#d99a4e');
  if(label)text('小文柯基',ox+p(26),oy+p(52),9,'#5b4d40','center');
}

// Physics
function physics(w,h){
  const inputX=Math.max(-1,Math.min(1,(keys.right?1:0)-(keys.left?1:0)+stick.x));
  const inputY=Math.max(-1,Math.min(1,(keys.down?1:0)-(keys.up?1:0)+stick.y));
  vx=inputX*3.1;
  px+=vx;

  if(mode==='mario'){
    vy+=.45;py+=vy;onGround=false;
    const all=[...marioPlatforms,[0,h-82,w,18]];
    for(const p of all){
      if(px>p[0]-12&&px<p[0]+p[2]+12&&py+12>p[1]&&py+12<p[1]+22&&vy>=0){
        py=p[1]-12;vy=0;onGround=true;
      }
    }
    if((keys.act||stick.y<-0.62)&&onGround){vy=-9;keys.act=false}
    if(py>h+40){px=60;py=300;vy=0;lives=Math.max(1,lives-1)}
    // Collect coins
    for(let i=0;i<8;i++){
      const x=150+i*95;
      const cy=280+Math.sin(i)*65;
      if(Math.abs(px-x)<14&&Math.abs(py-cy)<14){coins++;i=-1}
    }
    // Win check: reach flag at right edge
    if(px>w-90&&py>170){portal='win'}
  } else if(mode==='corgi'){
    // Corgi horizontal movement
    corgiState.playerX+=vx*1.5;
    corgiState.playerX=Math.max(0,Math.min(w-44,corgiState.playerX));
    corgiState.playerY=h-82;
    // Collision with fish
    corgiState.fishes.forEach((f,i)=>{
      if(Math.abs(corgiState.playerX+20-f.x-8)<22&&Math.abs(corgiState.playerY+10-f.y-5)<16){
        corgiState.score++;
        f.dx=(Math.random()>0.5?1:-1)*(1+Math.random());
        f.by=80+Math.random()*(h-160);
      }
    });
  } else if(mode==='koi'){
    // Koi: joystick is primary on mobile, click target remains a fallback.
    if(Math.abs(inputX)>.08||Math.abs(inputY)>.08){
      koiState.playerX+=inputX*3.0;
      koiState.playerY+=inputY*3.0;
      koiState.targetX=koiState.playerX;koiState.targetY=koiState.playerY;
    }else{
      koiState.playerX+=(koiState.targetX-koiState.playerX)*0.08;
      koiState.playerY+=(koiState.targetY-koiState.playerY)*0.08;
    }
    koiState.playerX=Math.max(20,Math.min(w-20,koiState.playerX));
    koiState.playerY=Math.max(20,Math.min(h-80,koiState.playerY));
    // Collision with koi
    koiState.koi.forEach((k,i)=>{
      if(Math.abs(koiState.playerX-k.x-12)<26&&Math.abs(koiState.playerY-k.y-7)<20){
        koiState.score++;
        k.dx=(Math.random()>0.5?1:-1)*(1.5+Math.random()*2);
        k.by=60+Math.random()*(h-160);
      }
    });
  } else {
    // Office/street: four-direction movement. Action stays separate for portals.
    const walk=3.1;
    py+=inputY*walk;
    py=Math.max(72,Math.min(h-70,py));
  }
  px=Math.max(20,Math.min(w-20,px));
}

function frame(t){
  renderTime=t;
  const w=canvas.clientWidth,h=canvas.clientHeight;
  if(!last)last=t;
  fpsFrames++;
  if(!fpsLast)fpsLast=t;
  if(t-fpsLast>=1000){
    if(fpsEl)fpsEl.textContent=`FPS ${Math.round(fpsFrames*1000/(t-fpsLast))}`;
    fpsFrames=0;fpsLast=t;
  }
  if(mode!=='mario'||lives>0){
    physics(w,h);
  }
  if(mode==='office') drawOffice(t,w,h);
  else if(mode==='street') drawStreet(t,w,h);
  else if(mode==='mario') drawMario(t,w,h);
  else if(mode==='corgi') drawCorgiGame(t,w,h);
  else if(mode==='koi') drawKoiGame(t,w,h);
  last=t;
  requestAnimationFrame(frame);
}

canvas.addEventListener('click',(e)=>{
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left;
  const my=e.clientY-rect.top;

  if(mode==='koi'){
    // Check if back button clicked
    if(mx<66&&my<38){
      mode='street';px=canvas.clientWidth*.80;py=canvas.clientHeight-130;
      msgEl.textContent=`锦鲤保佑结束！获得 ${koiState.score} 分好运！回到街区继续探索。`;
      return;
    }
    // Move player toward click
    koiState.targetX=mx-12;
    koiState.targetY=my-7;
  }

  if(mode==='corgi'){
    // Check if back button clicked
    if(mx<66&&my<38){
      mode='street';px=canvas.clientWidth*.55;py=canvas.clientHeight-130;
      msgEl.textContent=`柯基追鱼结束！吃到 ${corgiState.score} 条鱼。回到街区继续探索。`;
      return;
    }
  }

  if(mode==='mario'){
    // Check if back button clicked
    if(mx<66&&my<38){
      mode='street';px=canvas.clientWidth*.36;py=canvas.clientHeight-130;
      msgEl.textContent='返回街区。小游戏入口在公司外部。';
      return;
    }
  }

  if(mode==='office'||mode==='street'){
    // Check if back button clicked (shouldn't normally happen, but safety)
    if(mx<66&&my<38){
      if(mode==='street'){
        safeBack();
      }
    }
  }
});

function setStick(x,y){
  stick.x=x;stick.y=y;
  const knob=document.querySelector('#stickKnob');
  const base=document.querySelector('#stick');
  const travel=Math.max(22,base.getBoundingClientRect().width*.26);
  knob.style.transform=`translate(calc(-50% + ${Math.round(x*travel)}px), calc(-50% + ${Math.round(y*travel)}px))`;
}
function updateStick(e){
  const base=document.querySelector('#stick');
  const r=base.getBoundingClientRect();
  const cx=r.left+r.width/2,cy=r.top+r.height/2;
  let dx=e.clientX-cx,dy=e.clientY-cy;
  const max=r.width*.34,dist=Math.hypot(dx,dy);
  if(dist>max){dx=dx/dist*max;dy=dy/dist*max}
  setStick(dx/max,dy/max);
}
const stickEl=document.querySelector('#stick');
stickEl.onpointerdown=e=>{e.preventDefault();stickEl.setPointerCapture?.(e.pointerId);updateStick(e)};
stickEl.onpointermove=e=>{if(e.buttons)updateStick(e)};
stickEl.onpointerup=()=>setStick(0,0);
stickEl.onpointercancel=()=>setStick(0,0);
stickEl.onpointerleave=e=>{if(e.buttons) return; setStick(0,0)};
addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a'){keys.left=true;e.preventDefault()}
  if(k==='arrowright'||k==='d'){keys.right=true;e.preventDefault()}
  if(mode==='office'||mode==='street'){
    if(k==='arrowup'||k==='w'){keys.up=true;e.preventDefault()}
    if(k==='arrowdown'||k==='s'){keys.down=true;e.preventDefault()}
    if(k==='h'){goCompany();e.preventDefault()}
    if(k==='escape'||k==='backspace'){safeBack();e.preventDefault()}
    if(k===' '||k==='enter'||k==='e'){act();e.preventDefault()}
  } else if(k==='h'){
    goCompany();e.preventDefault();
  } else if(k==='escape'||k==='backspace'){
    safeBack();e.preventDefault();
  } else if(k===' '||k==='arrowup'||k==='w'||k==='enter'||k==='e'){
    act();e.preventDefault();
  }
});
addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  if(k==='arrowleft'||k==='a')keys.left=false;
  if(k==='arrowright'||k==='d')keys.right=false;
  if(k==='arrowup'||k==='w')keys.up=false;
  if(k==='arrowdown'||k==='s')keys.down=false;
});
</script>
